# chill-remna-bot — деплой сборкой из исходников (registry не нужен).
# Сценарий (см. УСТАНОВКА.md):
#   mkdir -p /opt/remnachillbot && cd /opt/remnachillbot
#   git clone <repo-url> .
#   nano docker-compose.yml      # заменить 2 строки с токенами ниже
#   docker compose up -d --build
#   # затем в Telegram боту: /start
#
# Стартует ТОЛЬКО бот, без базы. БД появляется по выбору в мастере:
#   • SQLite  — бот создаёт файл в томе bot-data;
#   • Postgres — бот сам допишет сюда сервис db и поднимет его (через docker.sock).
# При выборе «Локально» бот сам подключится к сети контейнера панели (PANEL_CONTAINER).
# Сети создавать вручную НЕ нужно.
#
# Если ставите НЕ в /opt/remnachillbot — поправьте путь "/opt/remnachillbot:/compose"
# и COMPOSE_HOST_DIR. Если контейнер панели называется не "remnawave" — задайте PANEL_CONTAINER.

name: remnachillbot

services:
  bot:
    build: .
    image: chill-remna-bot:local
    container_name: remnabot
    restart: unless-stopped
    environment:
      BOT_TOKEN: "ВПИШИТЕ_ТОКЕН_БОТА"
      ADMIN_TELEGRAM_ID: "ВПИШИТЕ_ВАШ_TELEGRAM_ID"
      DATA_DIR: /data
      COMPOSE_PROJECT: remnachillbot
      COMPOSE_FILE_PATH: /compose/docker-compose.yml
      COMPOSE_HOST_DIR: /opt/remnachillbot
      PANEL_CONTAINER: remnawave
    volumes:
      - bot-data:/data
      - /var/run/docker.sock:/var/run/docker.sock
      - /opt/remnachillbot:/compose

volumes:
  bot-data:
